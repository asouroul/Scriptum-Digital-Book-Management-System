{% extends "base.html" %}

{% block title %}Δημιουργία Challenge - Scriptum{% endblock %}

{% block content %}
<div class="card">
    <h2>Δημιουργία Νέου Reading Challenge</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="challenge_id">Challenge ID *</label>
            <input type="number" id="challenge_id" name="challenge_id" required>
        </div>
        
        <div class="form-group">
            <label for="challenge_name">Όνομα Challenge *</label>
            <input type="text" id="challenge_name" name="challenge_name" maxlength="30" required>
        </div>
        
        <div class="form-group">
            <label for="user_id">Χρήστης *</label>
            <select id="user_id" name="user_id" required>
                <option value="">Επιλέξτε χρήστη</option>
                {% for user in users %}
                <option value="{{ user.user_id }}">{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="start_date">Ημερομηνία Έναρξης *</label>
            <input type="date" id="start_date" name="start_date" required>
        </div>
        
        <div class="form-group">
            <label for="end_date">Ημερομηνία Λήξης *</label>
            <input type="date" id="end_date" name="end_date" required>
        </div>
        
        <div class="form-group">
            <label for="challenge_year">Έτος Challenge</label>
            <input type="number" id="challenge_year" name="challenge_year" min="2000" max="2100">
        </div>
        
        <div class="form-group">
            <label for="challenge_type">Τύπος Challenge</label>
            <input type="text" id="challenge_type" name="challenge_type" maxlength="20">
        </div>
        
        <button type="submit" class="btn btn-success">Δημιουργία Challenge</button>
        <a href="{{ url_for('challenges') }}" class="btn">Ακύρωση</a>
    </form>
</div>
{% endblock %}
