{% extends "base.html" %}

{% block title %}Προσθήκη Κριτικής - Scriptum{% endblock %}

{% block content %}
<div class="card">
    <h2>Γράψε Κριτική</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="user_id">Χρήστης *</label>
            <select id="user_id" name="user_id" required>
                <option value="">Επιλέξτε χρήστη</option>
                {% for user in users %}
                <option value="{{ user.user_id }}">{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="isbn">Βιβλίο *</label>
            <select id="isbn" name="isbn" required>
                <option value="">Επιλέξτε βιβλίο</option>
                {% for book in books %}
                <option value="{{ book.isbn }}">{{ book.book_title }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="review_id">Review ID *</label>
            <input type="number" id="review_id" name="review_id" required>
        </div>
        
        <div class="form-group">
            <label for="review_text">Κριτική *</label>
            <textarea id="review_text" name="review_text" required rows="6"></textarea>
        </div>
        
        <button type="submit" class="btn btn-success">Δημοσίευση Κριτικής</button>
        <a href="{{ url_for('reviews') }}" class="btn">Ακύρωση</a>
    </form>
</div>
{% endblock %}
